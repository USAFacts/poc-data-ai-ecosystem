services:
  postgres:
    image: postgres:16-alpine
    container_name: gov-data-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: pipeline
      POSTGRES_PASSWORD: pipeline
      POSTGRES_DB: pipeline
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ./scripts/seed-census.sql:/docker-entrypoint-initdb.d/seed-census.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pipeline"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: gov-data-minio
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Init container to create default buckets
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb local/gov-data-lake --ignore-existing;
      mc mb local/metadata-catalog --ignore-existing;
      mc anonymous set download local/gov-data-lake;
      exit 0;
      "

  backend:
    build: ./backend
    init: true
    container_name: gov-data-backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      weaviate:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    env_file:
      - ./backend/.env
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface:ro
    environment:
      - DATABASE_URL=postgresql://pipeline:pipeline@postgres:5432/pipeline
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=gov-data-lake
      - MINIO_SECURE=false
      - CORS_ORIGINS=http://localhost:3000,http://localhost:5173
      - WEAVIATE_HOST=weaviate
      - WEAVIATE_PORT=8080
      - WEAVIATE_GRPC_PORT=50051
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=pipeline123
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
      - GRAPH_ENABLED=true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  frontend:
    build: ./frontend
    container_name: gov-data-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

  jupyter:
    build: ./analysis
    container_name: gov-data-jupyter
    ports:
      - "8888:8888"
    depends_on:
      minio:
        condition: service_healthy
    env_file:
      - ./analysis/.env
    environment:
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET=gov-data-lake
      - MINIO_SECURE=false
    volumes:
      - jupyter_notebooks:/home/jovyan/work
      - ./analysis/notebooks:/home/jovyan/examples:ro

  # MDA MCP Embedding Server — provides vector embeddings via Model Context Protocol
  mcp-embedding:
    build: ./ingestion-processing/src/mcp_servers/embedding_server
    container_name: mda-mcp-embedding
    ports:
      - "8080:8000"
    environment:
      - MCP_SERVER_HOST=0.0.0.0
      - MCP_SERVER_PORT=8000
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/mcp')"]
      interval: 10s
      timeout: 5s
      retries: 3

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    container_name: gov-data-weaviate
    ports:
      - "8085:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    volumes:
      - weaviate_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5.26-community
    container_name: gov-data-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/pipeline123
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  minio_data:
  jupyter_notebooks:
  weaviate_data:
  neo4j_data:
