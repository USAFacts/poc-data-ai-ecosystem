apiVersion: pipeline/v1
kind: Workflow
metadata:
  name: federal-register-pipeline
spec:
  assetRef: federal-register-documents
  steps:
  - name: acquire
    type: acquisition
    config: {}
  - name: parse
    type: parse
    dependsOn:
    - acquire
    config:
      parser: basic
  - name: enrich
    type: enrichment
    dependsOn:
    - parse
    config:
      enricher: auto
      skip_if_exists: true
  - name: chunk
    type: chunk
    dependsOn:
    - parse
    config: {}
  - name: sync
    type: sync
    dependsOn:
    - enrich
    - chunk
    config: {}
